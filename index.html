<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .header {
            width: 400px;
            height: 500px;
            border: 2px solid rgb(7, 1, 1);
            margin: 30px auto;
            box-shadow: 10px 10px 10px black;
            border-radius: 10px;
        }
        .head {
            width: 70%;
            height: 80px;
            padding-left: 30%;
            padding-top: 30px;
            background-color: #4e4e52;
        }
        img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            align-items: center;
            border: 2px solid rgb(245, 241, 241);
            box-shadow: 10px 10px 10px black;
        }
        .text-box {
            padding: 40px;
            text-align: center;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        #px {
            line-height: 2px;
            font-style: bold;
        }
        .text {
            padding-top: 20px;
            line-height: 25px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .icon-IC {
            margin-top: -40px;
            padding-left: 70px;
        }

        i {
            font-size: 30px;
            margin: 10px;

        }

        .fa-instagram {
            color: #E1306C;
        }

        .fa-facebook {
            color: #1877F2;
        }

        .fa-linkedin {
            color: #0077B5;
        }

        .fa-github {
            color: black;
        }

        .fa-whatsapp {
            color: green;
        }

        i:hover {
            transform: scale(1.2);
        }

        /* ============================================= */
        .btn {
            width: 90%;
            border: 2px solid gray;
            border-radius: 10px;
            margin-left: 20px;
            text-align: center;
            background-color: rgb(34, 12, 129);

        }

        .btn a {
            color: white;
            font-size: 30px;
            text-decoration: none;

        }

        .btn:hover {
            background-color: red;

        }
    </style>

</head>

<body>
    <div class="header">

            </a>
